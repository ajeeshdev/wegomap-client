name: 🚀 Deploy Client via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER || 'ftp.wegomap.com' }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # Point this to your client folder on Hostinger
        server-dir: ./ 
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/out/**
          **/dist/**
          .next/**
          **/.next/**
          **/public/tinymce/**
          .env
          .env.local
