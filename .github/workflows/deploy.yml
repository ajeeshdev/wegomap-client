name: 🚀 Ultra-Fast Zip Deploy via FTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: 🏗️ Build & 📦 Zip & 🚀 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 📦 Install dependencies
      run: npm install

    - name: 🏗️ Build Next.js app
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: https://api-demo.wegomap.com/api

    - name: 📦 Create Deployment Zip
      run: |
        # Zip the essentials for a running Next.js app on Hostinger
        zip -r deploy.zip .next public server.js package.json package-lock.json next.config.ts .env.production -x "node_modules/*" ".git/*" ".github/*"

    - name: 📂 Upload Zip & Extractor
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ./
        # Only upload the zip and the PHP extractor
        local-dir: ./
        exclude: |
          **/*
          !deploy.zip
          !extract.php
          !.ftp-deploy-sync-state.json
